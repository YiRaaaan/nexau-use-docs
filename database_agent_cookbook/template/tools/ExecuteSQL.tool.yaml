type: tool
name: execute_sql
description: >-
  Execute a read-only SQL query against the connected database and return
  structured results.

  ## Usage
    - Only SELECT queries are allowed; DDL/DML (DROP, DELETE, UPDATE, INSERT,
      etc.) will be rejected.
    - Results are capped at `max_rows` rows (default 10).
    - Query timeout defaults to 30 seconds.

  ## Best practices
    - Always use LIMIT to restrict returned rows.
    - For large tables, run COUNT(*) first to estimate volume.
    - Use WHERE clauses to filter — avoid full table scans.
    - Use the database's SQL dialect (default: SQLite).

  ## Return format
    The result is a JSON object with:
    - `status` — "success" / "error" / "timeout"
    - `columns` — list of column names
    - `data` — list of row objects
    - `total_rows`, `row_count`, `truncated`
    - `warnings` — hints when results are empty or truncated

input_schema:
  type: object
  properties:
    sql:
      type: string
      description: The SQL query to execute (SELECT only).
    timeout:
      type: integer
      default: 30
      description: Query timeout in seconds (default 30).
    max_rows:
      type: integer
      default: 10
      description: Maximum rows to return (default 10).
  required:
    - sql
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#

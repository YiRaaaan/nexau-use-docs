type: tool
name: write_todos
description: >-
  Maintain a structured task list for complex, multi-step queries. Use this
  whenever the user's question requires more than one query or touches more
  than one table.

  ## When to use

  1. The question requires joining or aggregating across **2+ tables**.
  2. The question has **multiple parts** ("find X, then for each X compute Y").
  3. The first query failed and you need to **iterate** with a different plan.

  ## When NOT to use

  - Single-table, single-query questions.
  - Trivial lookups.

  ## Workflow

  1. Call `write_todos` with one item per planned step (status `pending`).
  2. Before starting an item, update it to `in_progress`.
     Only one item should be `in_progress` at a time.
  3. After successfully running the query for that item, mark it `completed`.
  4. When all items are `completed`, give the final answer.

input_schema:
  type: object
  properties:
    todos:
      type: array
      description: The full task list. Always send the WHOLE list, not a diff.
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable id for the task (e.g. "t1", "t2")
          content:
            type: string
            description: One-line description of the task
          status:
            type: string
            enum: [pending, in_progress, completed]
          priority:
            type: string
            enum: [low, medium, high]
        required: [id, content, status]
  required: [todos]
  additionalProperties: false
  $schema: http://json-schema.org/draft-07/schema#
